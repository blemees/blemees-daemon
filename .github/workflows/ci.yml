name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ruff check
        run: uvx --from "ruff>=0.6" ruff check .
      - name: ruff format --check
        run: uvx --from "ruff>=0.6" ruff format --check .

  test:
    name: Test — py ${{ matrix.python }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest = Linux x86_64, ubuntu-24.04-arm = Linux ARM64,
        # macos-latest = macOS Apple Silicon (ARM64). Pure-Python stdlib
        # package so the wheel is py3-none-any, but we exercise the three
        # host archs users actually run on.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (editable) with dev extras
        run: uv pip install --system -e ".[dev]"
      - name: Run pytest
        # requires_claude tests auto-skip unless -m requires_claude is set.
        run: pytest -q

  package:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
